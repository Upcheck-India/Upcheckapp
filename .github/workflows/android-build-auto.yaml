name: Auto Build Preview APK

on:
  workflow_dispatch:

  push:
    branches:
      - master   # 🔁 change if your branch name is different

jobs:
  build:
    # ✅ Run manually OR when commit message contains the flags
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[auto-build]') ||
      contains(github.event.head_commit.message, '[ab]') ||
      contains(github.event.head_commit.message, '[auto]')

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # 📥 Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # ⚡ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ⚡ Install deps (deterministic & fast)
      - name: Install dependencies
        run: npm ci

      # ☕ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🤖 Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ⚡ Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 🏗 Expo Prebuild
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --non-interactive

      # 🔧 Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 🏗 Build Preview APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      # 📦 Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: preview-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk