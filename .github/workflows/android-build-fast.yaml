name: Fast Build Preview APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v5

      # 🧠 Increase Node memory
      - name: Increase Node memory
        run: echo "NODE_OPTIONS=--max_old_space_size=4096" >> $GITHUB_ENV

      # ⚡ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 📦 Install deps
      - name: Install dependencies
        run: npm ci

      # ☕ Java
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # 🤖 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ⚡ Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('frontend/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # 🏗 Prebuild ONLY if android folder missing
      - name: Expo Prebuild
        run: |
          if [ ! -d android ]; then
            npx expo prebuild --platform android --non-interactive
          fi

      # 🔧 Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 🏗 Build APK (EAS-style logs + memory safe)
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --no-daemon \
            --stacktrace \
            --info

      # 📦 Upload
      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: preview-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk