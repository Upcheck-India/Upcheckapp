services:
  # Web Service
  - type: web
    name: upcheck-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID_WEB
        sync: false
      - key: GOOGLE_CLIENT_ID_IOS
        sync: false
      - key: GOOGLE_CLIENT_ID_ANDROID
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: FRONTEND_URL
        value: "upcheck://"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SENDER_NAME
        value: Upcheck
      - key: SMTP_SENDER_EMAIL
        sync: false
  # Note: former otp-cleanup cron removed — OTP is Supabase-native and 2FA tokens auto-expire in Redis.
