services:
  # Web Service
  - type: web
    name: upcheck-backend
    env: node
    # Free plan spins the instance down after ~15 min idle; the first request
    # after that eats a ~50s cold-start boot. No keep-alive cron is configured
    # here — mitigate with an external uptime ping (see docs/OPERATIONS.md).
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    # autoDeploy ships every master commit straight to prod. .github/workflows/ci.yml
    # runs backend build+test (and frontend tsc+jest) on PRs as the gate before merge —
    # this deploy step itself does not re-run tests, so keep CI green on master.
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Boot-critical: SupabaseAuthService throws at startup when this is
      # missing, which crash-loops the deploy (requests then hang at the edge).
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Must be a Supavisor pooler URL (aws-0-<region>.pooler.supabase.com).
      # Render has no IPv6 egress and Supabase direct hosts
      # (db.<ref>.supabase.co) are IPv6-only without the IPv4 add-on — a direct
      # URL makes the DB connection hang and the deploy never becomes healthy.
      - key: DATABASE_URL
        sync: false
      # Email goes through the Brevo HTTP API (src/email.service.ts), not SMTP.
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_SENDER_NAME
        value: Upcheck
      - key: SMTP_SENDER_EMAIL
        sync: false
      # Used in password-reset / verification email links.
      - key: FRONTEND_URL
        sync: false
      # Boot-critical in production (CORS-1, backend/src/common/cors-guard.ts):
      # main.ts defaults this to "*" for dev convenience, but the app refuses
      # to boot with a wildcard when NODE_ENV=production. The mobile app
      # itself is unaffected either way (CORS is browser-only — native HTTP
      # clients never send/enforce an Origin header); this only matters if a
      # browser-based client (e.g. an Expo web build or admin panel) ever
      # calls this API. Comma-separate multiple origins, no trailing slash,
      # never "*". Must be set on the Render dashboard — not committed here.
      - key: CORS_ORIGIN
        sync: false
  # Note: a former "otp-cleanup" cron was removed — OTP login is Supabase-native
  # and 2FA pending/temp tokens auto-expire in Redis, so there is nothing to prune.
