name: CI

# Quality gate before Render auto-deploys master (render.yaml autoDeploy:true).
# Backend and frontend must typecheck and pass their test suites.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # postinstall runs `nest build` (tsc), so install already typechecks.
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend (typecheck + test)
    runs-on: ubuntu-latest
    # Canonical app timezone is IST (DATE-1); local-date tests assert non-UTC
    # behavior, so run in Asia/Kolkata rather than the runner's default UTC.
    env:
      TZ: Asia/Kolkata
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --ci
