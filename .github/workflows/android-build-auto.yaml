name: Auto Build Preview APK

on:
  workflow_dispatch:

  push:
    branches:
      - master   # change if needed

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[auto-build]') ||
      contains(github.event.head_commit.message, '[ab]') ||
      contains(github.event.head_commit.message, '[auto]')

    runs-on: ubuntu-latest

    # NODE_OPTIONS can no longer be written via $GITHUB_ENV (GitHub blocks it),
    # so set the heap bump as a job-level env var instead.
    env:
      NODE_OPTIONS: --max_old_space_size=4096

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('frontend/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Expo Prebuild
        run: |
          if [ ! -d android ]; then
            npx expo prebuild --platform android --non-interactive
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --no-daemon \
            --stacktrace \
            --info

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: preview-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk