services:
  # Web Service
  - type: web
    name: upcheck-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    # Start only — do NOT run migrations here. Render's DATABASE_URL is the
    # Supabase POOLER (transaction mode), which is unreliable for migrations
    # (advisory locks / DDL). Migrations are a deliberate step run with the
    # DIRECT connection (locally or CI): `DATABASE_URL=<direct> npm run migration:run`.
    # The startup schema-guard (main.ts) fails fast & loud if the DB was never
    # migrated, so a forgotten migration can't limp into per-query errors.
    startCommand: npm run start:prod
    # Health check path - checks if app is ready to serve requests
    # Render uses this to determine service health
    # During cold starts (after inactivity), Render gives ~30s for startup
    # The /api/liveness endpoint is used for quick startup detection
    # The /api/health endpoint checks database + memory (more comprehensive)
    healthCheckPath: /api/liveness
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ============================================
      # IMPORTANT: Set these in Render Dashboard!
      # ============================================
      # 'sync: false' means these are NOT auto-synced from this file
      # You MUST manually add these in Render Dashboard:
      # Dashboard > Your Service > Environment > Add Environment Variable
      #
      # REQUIRED for app to start:
      # - DATABASE_URL (Supabase PostgreSQL connection string)
      # - SUPABASE_URL
      # - SUPABASE_ANON_KEY
      # - SUPABASE_SERVICE_ROLE_KEY
      # - SUPABASE_JWT_SECRET
      # - JWT_SECRET (or JWT_PRIVATE_KEY/JWT_PUBLIC_KEY for RS256)
      #
      # Without DATABASE_URL, the app will fail to connect to PostgreSQL
      # and show "ECONNREFUSED localhost:5432" error
      # ============================================
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # DATABASE_URL - Supabase PostgreSQL connection string
      # Use the POOLER connection (port 6543) for better performance:
      # Format: postgresql://postgres.[project-ref]:[password]@aws-1-[region].pooler.supabase.com:6543/postgres
      # Example: postgresql://postgres.hporygudvkfoegxzsivt:PASSWORD@aws-1-ap-south-1.pooler.supabase.com:6543/postgres
      # IMPORTANT: This MUST be set in Render Dashboard or app will crash!
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      # Google OAuth Client IDs - must match Google Cloud Console
      # These are used by Supabase to verify Google OAuth tokens
      - key: GOOGLE_CLIENT_ID_WEB
        sync: false
      - key: GOOGLE_CLIENT_ID_IOS
        sync: false
      - key: GOOGLE_CLIENT_ID_ANDROID
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: FRONTEND_URL
        # Must match the Expo app scheme (app.config.ts) so the password-reset
        # deep link (FRONTEND_URL/reset-password) opens the app.
        value: "upcheckapp://"
      # Brevo/SMTP for emails
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SENDER_NAME
        value: Upcheck
      - key: SMTP_SENDER_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      # Truecaller SDK
      - key: TRUECALLER_CLIENT_ID
        sync: false
      # Redis (optional - app falls back to in-memory store)
      - key: REDIS_URL
        sync: false
  # Note: OTP is Supabase-native; 2FA tokens auto-expire in Redis or in-memory fallback.
